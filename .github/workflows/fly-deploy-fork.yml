# fork 先で自分用 Fly アプリへデプロイする（fly.toml は変更しない）
#
# 事前準備:
# 1. fly apps create <名前> --org personal
# 2. ローカルで: fly tokens create deploy -a <名前>  （ダッシュボードの汎用トークンより確実）
# 3. GitHub:
#    - Secret: FLY_API_TOKEN = 上記トークン
#    - Variable: FLY_APP_NAME = アプリ名（例: swh2026keidoroa）
#    - Variable（任意）: FLY_ORG = personal（省略時は personal）
#
# fly.toml の app は本家名のまま。デプロイ時のみ fly.deploy.toml を生成して app 行を FLY_APP_NAME に合わせる（レポの fly.toml は変更しない）。

name: Deploy to Fly.io (fork)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.FLY_APP_NAME != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Verify token can see app
        run: |
          set -euo pipefail
          APP_NAME=$(printf '%s' "${FLY_APP_NAME}" | tr -d '\r\n' | xargs)
          export FLY_ORG="${FLY_ORG:-personal}"
          echo "FLY_ORG=${FLY_ORG}  target_app=${APP_NAME}"
          fly version
          fly status -a "$APP_NAME"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          FLY_ORG: ${{ vars.FLY_ORG }}

      - name: Deploy
        run: |
          set -euo pipefail
          APP_NAME=$(printf '%s' "${FLY_APP_NAME}" | tr -d '\r\n' | xargs)
          export FLY_ORG="${FLY_ORG:-personal}"
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^app[[:space:]]*=[[:space:]]*\" ]]; then
              printf '%s\n' "app = \"${APP_NAME}\""
            else
              printf '%s\n' "$line"
            fi
          done < fly.toml > fly.deploy.toml
          head -n 12 fly.deploy.toml
          fly deploy --remote-only --app "$APP_NAME" --config fly.deploy.toml --dockerfile Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          FLY_ORG: ${{ vars.FLY_ORG }}
