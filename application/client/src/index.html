<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <script>
      window.__PREFETCH__ = {};
      var postsP = fetch('/api/v1/posts?limit=30&offset=0').then(function(r) { return r.ok ? r.json() : Promise.reject(r); });
      window.__PREFETCH__['/api/v1/posts?limit=30&offset=0'] = postsP;
      window.__PREFETCH__['/api/v1/me'] = fetch('/api/v1/me').then(function(r) { return r.ok ? r.json() : Promise.reject(r); });
      postsP.then(function(posts) {
        if (!posts || !posts.length) return;
        var postWithImage = null;
        for (var i = 0; i < posts.length; i++) {
          if (posts[i].images && posts[i].images[0]) {
            postWithImage = posts[i];
            break;
          }
        }
        if (postWithImage && postWithImage.images[0]) {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = '/images/' + postWithImage.images[0].id + '.jpg';
          link.fetchPriority = 'high';
          document.head.appendChild(link);
        }
        var first = posts[0];
        if (first && first.user && first.user.profileImage) {
          var link2 = document.createElement('link');
          link2.rel = 'preload';
          link2.as = 'image';
          link2.href = '/images/profiles/' + first.user.profileImage.id + '.jpg';
          link2.fetchPriority = 'high';
          document.head.appendChild(link2);
        }
      }).catch(function(){});
    </script>
    <div id="app">
      <div style="display:flex;justify-content:center;font-family:sans-serif">
        <div style="display:flex;min-height:100vh;max-width:100%">
          <div style="width:100%;max-width:640px;padding:16px">
            <p style="font-size:1.5rem;color:#6b7280">読み込み中...</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
