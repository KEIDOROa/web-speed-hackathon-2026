<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CaX（カックス）はつぶやきや写真・動画・音声の投稿、検索、ダイレクトメッセージ、AIチャット（Crok）などが利用できるソーシャルサービスです。"
    />
    <title>CaX</title>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <script>
      window.__PREFETCH__ = {};
      function fetchWithTimeout(url, ms) {
        var ctrl = new AbortController();
        var tid = setTimeout(function() { ctrl.abort(); }, ms);
        return fetch(url, { signal: ctrl.signal, credentials: "same-origin" }).then(function(r) {
          clearTimeout(tid);
          return r.ok ? r.json() : Promise.reject(r);
        }).catch(function(e) { clearTimeout(tid); return Promise.reject(e); });
      }
      window.__BOOTSTRAP_ME__ = { status: 'pending' };
      var meP = fetchWithTimeout('/api/v1/me', 30000);
      window.__PREFETCH__['/api/v1/me'] = meP;
      meP.then(function(user) {
        window.__BOOTSTRAP_ME__ = { status: 'ok', user: user };
        window.dispatchEvent(new Event('cax-bootstrap-me'));
      }).catch(function() {
        window.__BOOTSTRAP_ME__ = { status: 'guest' };
        window.dispatchEvent(new Event('cax-bootstrap-me'));
      });
      var postsP = fetchWithTimeout('/api/v1/posts?limit=30&offset=0', 30000);
      window.__PREFETCH__['/api/v1/posts?limit=30&offset=0'] = postsP;
      postsP.then(function(posts) {
        if (!posts || !posts.length) return;
        var mediaPost = null;
        var mediaKind = null;
        for (var i = 0; i < posts.length; i++) {
          var p = posts[i];
          if (p.images && p.images[0]) {
            mediaPost = p;
            mediaKind = 'image';
            break;
          }
          if (p.movie && p.movie.id) {
            mediaPost = p;
            mediaKind = 'movie';
            break;
          }
        }
        if (mediaPost && mediaKind === 'image' && mediaPost.images[0]) {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = '/images/' + mediaPost.images[0].id + '.jpg?w=480';
          link.fetchPriority = 'high';
          document.head.appendChild(link);
        } else if (mediaPost && mediaKind === 'movie' && mediaPost.movie && mediaPost.movie.id) {
          var linkM = document.createElement('link');
          linkM.rel = 'preload';
          linkM.as = 'image';
          linkM.href = '/movies/' + mediaPost.movie.id + '.gif?w=480';
          linkM.fetchPriority = 'high';
          document.head.appendChild(linkM);
        }
        var first = posts[0];
        if (first && first.user && first.user.profileImage) {
          var link2 = document.createElement('link');
          link2.rel = 'preload';
          link2.as = 'image';
          link2.href = '/images/profiles/' + first.user.profileImage.id + '.jpg?w=96';
          link2.fetchPriority = 'high';
          document.head.appendChild(link2);
        }
      }).catch(function(){});
    </script>
    <div id="app">
      <div style="display:flex;justify-content:center;font-family:sans-serif">
        <div style="display:flex;min-height:100vh;max-width:100%">
          <div style="width:100%;max-width:640px;padding:16px">
            <p style="font-size:1.5rem;color:#6b7280">読み込み中...</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
