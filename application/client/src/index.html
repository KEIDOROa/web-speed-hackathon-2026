  <body class="bg-cax-canvas text-cax-text">
    <script>
      window.__PREFETCH__ = {};
      window.__PREFETCH__['/api/v1/posts?limit=30&offset=0'] = fetch('/api/v1/posts?limit=30&offset=0').then(function(r) { return r.ok ? r.json() : Promise.reject(r); });

          </div>
        </div>
      </div>
    </div>
